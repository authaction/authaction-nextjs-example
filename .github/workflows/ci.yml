name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_AUTHACTION_DOMAIN: example.authaction.com
          NEXT_PUBLIC_AUTHACTION_CLIENT_ID: dummy-client-id
          NEXT_PUBLIC_AUTHACTION_REDIRECT_URI: http://localhost:3000/callback
