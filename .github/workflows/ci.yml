name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXTAUTH_SECRET: dummy-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000
          AUTHACTION_TENANT_DOMAIN: example.authaction.com
          AUTHACTION_CLIENT_ID: dummy-client-id
          AUTHACTION_CLIENT_SECRET: dummy-client-secret
